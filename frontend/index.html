<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ABC Home Staging — AI Voice Assistant for premium home staging consultations">
    <title>ABC Home Staging — AI Voice Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-blob blob-1"></div>
        <div class="gradient-blob blob-2"></div>
        <div class="gradient-blob blob-3"></div>
        <div class="gradient-blob blob-4"></div>
        <canvas id="particleCanvas"></canvas>
    </div>

    <!-- Floating Grid Lines -->
    <div class="grid-overlay"></div>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <rect x="4" y="16" width="32" height="20" rx="2" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 16V8a8 8 0 1 1 16 0v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <rect x="10" y="22" width="6" height="8" rx="1" fill="currentColor" opacity="0.3"/>
                        <rect x="24" y="22" width="6" height="8" rx="1" fill="currentColor" opacity="0.3"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>ABC Home Staging</h1>
                    <span class="logo-subtitle">AI Voice Assistant</span>
                </div>
            </div>
            <div class="header-status">
                <div class="connection-dot" id="connectionDot"></div>
                <span id="headerStatus">Ready</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Panel — Voice Interface -->
            <section class="voice-panel">
                <!-- Orb Visualizer -->
                <div class="orb-container" id="orbContainer">
                    <div class="orb-glow"></div>
                    <div class="orb-ring ring-1"></div>
                    <div class="orb-ring ring-2"></div>
                    <div class="orb-ring ring-3"></div>
                    <div class="orb-core" id="orbCore">
                        <div class="orb-inner"></div>
                        <canvas id="waveformCanvas" width="200" height="200"></canvas>
                    </div>
                    <!-- Sound wave bars -->
                    <div class="sound-bars" id="soundBars">
                        <span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>

                <!-- Status Display -->
                <div class="status-area">
                    <div class="status-badge" id="statusBadge">
                        <div class="status-pulse"></div>
                        <span id="statusText">Ready to Connect</span>
                    </div>
                    <div class="timer" id="callTimer">00:00</div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn btn-start" id="btnStart" onclick="window.app.startConversation()">
                        <div class="btn-glow"></div>
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                        <span>Start Conversation</span>
                    </button>
                    <button class="btn btn-end" id="btnEnd" disabled onclick="window.app.endConversation()">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                        <span>End Conversation</span>
                    </button>
                </div>
            </section>

            <!-- Right Panel — Transcript -->
            <section class="transcript-panel">
                <div class="panel-header">
                    <h2>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        Live Transcript
                    </h2>
                    <button class="btn-clear" id="btnClear" onclick="window.app.clearTranscript()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Clear
                    </button>
                </div>
                <div class="transcript-body" id="transcriptBody">
                    <div class="transcript-empty" id="transcriptEmpty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" opacity="0.4"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" opacity="0.4"/>
                            <line x1="12" y1="19" x2="12" y2="23" opacity="0.4"/>
                            <line x1="8" y1="23" x2="16" y2="23" opacity="0.4"/>
                        </svg>
                        <p>Start a conversation to see the live transcript</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer Info Bar -->
        <footer class="app-footer">
            <div class="footer-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>End-to-end encrypted</span>
            </div>
            <div class="footer-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Low latency WebSocket</span>
            </div>
            <div class="footer-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span>Powered by Vapi AI</span>
            </div>
        </footer>
    </div>

    <script src="/static/audio.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
